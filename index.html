          const workoutName = this.dataStore.getWorkoutName(workoutId);
          const formattedDate = this.formatDate(date);

          if (!confirm(`Delete "${workoutName}" from ${formattedDate}? This cannot be undone.`)) {

          const deletedCount = await this.dataStore.deleteWorkoutRecords(date, workoutId);

          this.showSyncStatus(`Workout deleted (${deletedCount} sets)`, 2000);

          this.showView('historyView');
          await this.loadHistory();
        }

        async saveRecordEdit() {
          const newWeight = parseInt(document.getElementById("editWeight").value);
          const newReps = parseInt(document.getElementById("editReps").value);

          if (!newWeight || !newReps) {
            alert("Please enter both weight and reps");
            return;
          }

          const { date, workoutId, exerciseId, setNumber } = this.editingRecord;

          // Update the record
          await this.dataStore.updateRecord(date, workoutId, exerciseId, setNumber, newWeight, newReps);

          this.closeModal();
          this.showSyncStatus("Set updated", 2000);

          // Refresh the workout details view
          await this.showWorkoutDetails(this.currentHistoricalWorkout.date, this.currentHistoricalWorkout.workoutId);
        }

        async deleteRecordFromModal() {
          if (!confirm("Delete this set? This cannot be undone.")) {
            return;
          }

          const { date, workoutId, exerciseId, setNumber } = this.editingRecord;

          // Delete the record
          await this.dataStore.deleteRecord(date, workoutId, exerciseId, setNumber);

          this.closeModal();
          this.showSyncStatus("Set deleted", 2000);

          // Refresh the workout details view
          await this.showWorkoutDetails(this.currentHistoricalWorkout.date, this.currentHistoricalWorkout.workoutId);
        }



        // Modal Management
        async showConfigModal() {
          const modal = document.getElementById("modal");
          const content = document.getElementById("modalContent");
          const config = this.syncService.getConfig();
          const lastSync = await this.syncService.getLastSyncTime();
          const lastSyncText = this.syncService.formatLastSync(lastSync);

          content.innerHTML = `
                    <div class="modal-header">
                        <h2 class="modal-title">Sync Configuration</h2>
                        <button class="modal-close" onclick="app.closeModal()">Close</button>
                    </div>
                    <form onsubmit="event.preventDefault(); app.saveConfig();">
                        <div class="form-group">
                            <label class="form-label" for="apiUrl">Server URL</label>
                            <input type="url"
                                   class="form-input"
                                   id="apiUrl"
                                   placeholder="http://192.168.1.100:3000"
                                   value="${config.apiUrl}"
                                   autocomplete="off">
                        </div>
                        <p style="font-size: 12px; color: #8e8e93; margin: 8px 0 16px 0;">
                            No API key needed - Tailscale provides network security
                        </p>
                        <button type="submit" class="button-primary">Save Configuration</button>
                    </form>
                    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e5ea;">
                        <p style="font-size: 14px; color: #8e8e93; margin-bottom: 12px;">
                            Last sync: ${lastSyncText}
                        </p>
                        <button class="button-secondary" style="margin: 0; width: 100%;" onclick="app.testConnection()">
                            Test Connection
                        </button>
                    </div>
                `;

          modal.classList.add("show");
        }

        async testConnection() {
          this.showSyncStatus("Testing connection...", 10000);
          const connected = await this.syncService.checkConnection();
          if (connected) {
            this.showSyncStatus("Connection successful!", 2000);
          } else {
            this.showSyncStatus("Connection failed - check URL", 3000);
          }
        }

        async saveConfig() {
          const apiUrl = document.getElementById("apiUrl").value.trim();

          this.syncService.setConfig(apiUrl);

          await this.updateConfigStatus();
          this.closeModal();

          if (this.syncService.isConfigured()) {
            this.sync();
          }
        }

        showAddExerciseModal() {
          const modal = document.getElementById("modal");
          const content = document.getElementById("modalContent");

          content.innerHTML = `
                    <div class="modal-header">
                        <h2 class="modal-title">Add Exercise</h2>
                        <button class="modal-close" onclick="app.closeModal()">Cancel</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Exercise Name</label>
                        <input type="text" class="form-input" id="exerciseName" 
                               placeholder="e.g., Bench Press" autocomplete="off">
                    </div>
                    <button class="button-primary" onclick="app.addExercise()">Add Exercise</button>
                `;

          modal.classList.add("show");
          setTimeout(
            () => document.getElementById("exerciseName").focus(),
            100
          );
        }

        showEditExerciseModal(exerciseId) {
          this.editingExerciseId = exerciseId;
          const exercise = this.dataStore.exerciseMap.get(exerciseId);
          const modal = document.getElementById("modal");
          const content = document.getElementById("modalContent");

          content.innerHTML = `
                    <div class="modal-header">
                        <h2 class="modal-title">Edit Exercise</h2>
                        <button class="modal-close" onclick="app.closeModal()">Cancel</button>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Exercise Name</label>
                        <input type="text" class="form-input" id="exerciseName" 
                               value="${exercise.name}" autocomplete="off">
                    </div>
                    <button class="button-primary" onclick="app.saveExerciseEdit()">Save Changes</button>
                    <button class="button-secondary" style="color: #ff3b30; margin-top: 8px;" onclick="app.deleteExerciseFromModal()">Delete Exercise</button>
                `;

          modal.classList.add("show");
          setTimeout(
            () => document.getElementById("exerciseName").focus(),
            100
          );
        }

        async addExercise() {
          const name = document.getElementById("exerciseName").value.trim();
          if (!name) {
            alert("Please enter an exercise name");
            return;
          }

          await this.dataStore.addExercise(name);
          this.closeModal();
          await this.loadExercisesList();
          this.showSyncStatus("Exercise added", 2000);
        }

        async saveExerciseEdit() {
          const name = document.getElementById("exerciseName").value.trim();
          if (!name) {
            alert("Please enter an exercise name");
            return;
          }

          await this.dataStore.updateExercise(this.editingExerciseId, name);
          this.closeModal();
          await this.loadExercisesList();
          this.showSyncStatus("Exercise updated", 2000);
        }

        async deleteExercise(exerciseId) {
          if (confirm("Delete this exercise? It will be hidden but data preserved.")) {
            await this.dataStore.softDeleteExercise(exerciseId);
            await this.loadExercisesList();
          }
        }

        deleteExerciseFromModal() {
          this.closeModal();
          // Use setTimeout to ensure modal is closed before showing confirm dialog
          setTimeout(async () => {
            if (confirm("Delete this exercise? It will be hidden but data preserved.")) {
              await this.dataStore.softDeleteExercise(this.editingExerciseId);
              await this.loadExercisesList();
            }
          }, 100);
        }

        async showDeletedExercisesModal() {
          const deletedExercises = await this.dataStore.getDeletedExercises();
          const modal = document.getElementById("modal");
          const content = document.getElementById("modalContent");

          content.innerHTML = `
                    <div class="modal-header">
                        <h2 class="modal-title">Deleted Exercises</h2>
                        <button class="modal-close" onclick="app.closeModal()">Close</button>
                    </div>
                    <div class="list-container" style="margin: 0">
                        ${deletedExercises
                          .map(
                            (exercise) => `
                            <div class="list-item">
                                <div class="list-item-title">${exercise.name}</div>
                                <button class="restore-btn" onclick="app.restoreExercise('${exercise.id}')">Restore</button>
                            </div>
                        `
                          )
                          .join("")}
                    </div>
                `;

          modal.classList.add("show");
        }

        async restoreExercise(exerciseId) {
          await this.dataStore.restoreExercise(exerciseId);
          await this.loadExercisesList();
          this.showSyncStatus("Exercise restored", 2000);

          // Refresh modal content, or close if no more deleted exercises
          const deletedExercises = await this.dataStore.getDeletedExercises();
          if (deletedExercises.length === 0) {
            this.closeModal();
          } else {
            await this.showDeletedExercisesModal();
          }
        }

        showCreateWorkoutView() {
          this.editingWorkoutId = null;
          this.tempWorkoutExercises = [];
          this.showView('createWorkoutView');
          document.getElementById('newWorkoutName').value = '';
          document.getElementById('createWorkoutTitle').textContent = 'New Workout';
          document.getElementById('deleteWorkoutSection').style.display = 'none';
          this.renderWorkoutExerciseList();
        }

        showEditWorkoutView(workoutId) {
          const workout = this.dataStore.workoutMap.get(workoutId);
          if (!workout) return;
          this.editingWorkoutId = workoutId;
          this.tempWorkoutExercises = workout.exercises.map((ex, i) => ({
            exerciseId: ex.exerciseId,
            order: i + 1
          }));
          this.showView('createWorkoutView');
          document.getElementById('newWorkoutName').value = workout.name;
          document.getElementById('createWorkoutTitle').textContent = 'Edit Workout';
          document.getElementById('deleteWorkoutSection').style.display = '';
          this.renderWorkoutExerciseList();
        }

        renderWorkoutExerciseList() {
          const container = document.getElementById('workoutExerciseList');
          if (this.tempWorkoutExercises.length === 0) {
            container.innerHTML = '<div class="empty-state" style="padding: 20px 0;"><p style="color: #8e8e93;">No exercises added yet</p></div>';
            return;
          }
          container.innerHTML = this.tempWorkoutExercises.map((ex, i) => {
            const name = this.dataStore.getExerciseName(ex.exerciseId);
            return `<div class="workout-exercise-row">
              <div class="workout-exercise-name">${name}</div>
              <div class="workout-exercise-actions">
                <button onclick="app.moveWorkoutExercise(${i}, -1)" ${i === 0 ? 'disabled style="opacity:0.3"' : ''}>&#9650;</button>
                <button onclick="app.moveWorkoutExercise(${i}, 1)" ${i === this.tempWorkoutExercises.length - 1 ? 'disabled style="opacity:0.3"' : ''}>&#9660;</button>
                <button class="delete-btn" onclick="app.removeWorkoutExercise(${i})">&#10005;</button>
              </div>
            </div>`;
          }).join('');
        }

        showExercisePickerModal() {
          const selectedIds = this.tempWorkoutExercises.map(e => e.exerciseId);
          const allExercises = Array.from(this.dataStore.exerciseMap.values());
          const available = this.sortExercises(allExercises.filter(ex => !ex.isDeleted && !selectedIds.includes(ex.id)));

          const modal = document.getElementById('modal');
          const content = document.getElementById('modalContent');
          content.innerHTML = `
                    <div class="modal-header">
                        <h2 class="modal-title">Add Exercise</h2>
                        <button class="modal-close" onclick="app.closeModal()">Cancel</button>
                    </div>
                    ${this.renderSearchInput('exercisePickerList')}
                    <div class="list-container" id="exercisePickerList" style="margin: 0">
                        ${available.map(ex => `
                            <div class="list-item" onclick="app.pickExerciseForWorkout('${ex.id}')">
                                <div class="list-item-title">${ex.name}</div>
                                <div class="list-item-arrow">&#8250;</div>
                            </div>
                        `).join('')}
                    </div>
                `;
          modal.classList.add('show');
        }

        pickExerciseForWorkout(exerciseId) {
          this.tempWorkoutExercises.push({
            exerciseId,
            order: this.tempWorkoutExercises.length + 1
          });
          this.closeModal();
          this.renderWorkoutExerciseList();
        }

        moveWorkoutExercise(index, direction) {
          const newIndex = index + direction;
          if (newIndex < 0 || newIndex >= this.tempWorkoutExercises.length) return;
          const temp = this.tempWorkoutExercises[index];
          this.tempWorkoutExercises[index] = this.tempWorkoutExercises[newIndex];
          this.tempWorkoutExercises[newIndex] = temp;
          this.tempWorkoutExercises.forEach((ex, i) => ex.order = i + 1);
          this.renderWorkoutExerciseList();
        }

        removeWorkoutExercise(index) {
          this.tempWorkoutExercises.splice(index, 1);
          this.tempWorkoutExercises.forEach((ex, i) => ex.order = i + 1);
          this.renderWorkoutExerciseList();
        }

        cancelCreateWorkout() {
          this.showView('workoutsView');
        }

        async deleteWorkout() {
          if (!this.editingWorkoutId) return;

          if (this.currentWorkout && this.currentWorkout.id === this.editingWorkoutId) {
            alert('Cannot delete a workout that is currently active');
            return;
          }

          if (!confirm('Delete this workout? Historical records will show "Unknown Workout".')) return;

          await this.dataStore.deleteWorkout(this.editingWorkoutId);
          this.showView('workoutsView');
          this.showSyncStatus('Workout deleted', 2000);
        }

        async saveNewWorkout() {
          const name = document.getElementById('newWorkoutName').value.trim();
          if (!name) {
            alert('Please enter a workout name');
            return;
          }
          if (this.tempWorkoutExercises.length === 0) {
            alert('Please add at least one exercise');
            return;
          }

          const existing = Array.from(this.dataStore.workoutMap.values());
          if (existing.some(w => w.name.toLowerCase() === name.toLowerCase() && w.id !== this.editingWorkoutId)) {
            alert('A workout with this name already exists');
            return;
          }

          if (this.editingWorkoutId) {
            await this.dataStore.updateWorkout(this.editingWorkoutId, name, this.tempWorkoutExercises);
            this.showView('workoutsView');
            this.showSyncStatus('Workout updated', 2000);
          } else {
            await this.dataStore.addWorkout(name, this.tempWorkoutExercises);
            this.showView('workoutsView');
            this.showSyncStatus('Workout created', 2000);
          }
        }

        closeModal() {
          document.getElementById("modal").classList.remove("show");
        }

        // Utility Methods
        formatDate(dateString) {
          // Parse date string as local time, not UTC
          // dateString is in format "YYYY-MM-DD"
          const [year, month, day] = dateString.split('-').map(num => parseInt(num, 10));
          const date = new Date(year, month - 1, day); // month is 0-indexed in Date constructor
          
          const months = [
            "Jan",
            "Feb",
            "Mar",
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec",
          ];
          return `${
            months[date.getMonth()]
          } ${date.getDate()}, ${date.getFullYear()}`;
        }
      }

      // Initialize App
      const app = new WeightTrackerApp();
      app.initialize();

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('ServiceWorker registered:', registration.scope);
          })
          .catch((error) => {
            console.error('ServiceWorker registration failed:', error);
          });
      }
    </script>
  </body>
</html>
